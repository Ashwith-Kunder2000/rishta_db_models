name: Publish DB Models

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          registry-url: https://npm.pkg.github.com/

      # Install dependencies
      - name: Install Dependencies
        run: npm install

      # Verify package name & version (debug step)
      - name: Check package.json
        run: cat package.json

      # Publish package (safe)
      - name: Publish Package
        run: npm publish || echo "Skipping publish (possibly version already exists)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}